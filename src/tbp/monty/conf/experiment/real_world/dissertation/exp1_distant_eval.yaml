# @package _global_
#
# Experiment 1 — Baseline Feasibility: Distant Agent Evaluation
#
# Loads the checkpoint saved by exp1_distant_train and evaluates recognition
# on the same 5–7 objects in canonical orientation using the ZED camera.
# The manual scene picker lets you select or capture scenes per episode.
#
# NOTE: This loads YOUR trained model, not TBP's pretrained model.
# For the TBP sim-to-real sanity check (mug only), run the stock
# zed_supervised_eval.yaml without modification.
#
# Usage:
#   python run.py experiment=real_world/dissertation/exp1_distant_eval experiment.config.model_name_or_path=results/monty/projects/monty_runs/exp1_distant_train/pretrained/0/model.pt
#
# Key output metrics (eval_stats.csv):
#   percent_correct, percent_confused, percent_no_match,
#   avg_rotation_error, avg_num_lm_steps, avg_num_monty_matching_steps

defaults:
  - /experiment/real_world/zed_supervised_eval

config:
  do_eval: true
  n_eval_epochs: 1
  max_eval_steps: 500
  max_total_steps: 500
  model_name_or_path: "results/monty/projects/monty_runs/exp1_distant_train/pretrained/0/model.pt"
  logging:
    run_name: exp1_distant_eval
