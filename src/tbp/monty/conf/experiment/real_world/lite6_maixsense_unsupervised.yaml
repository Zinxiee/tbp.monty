# @package _global_

defaults:
  - /monty: graph_exp1000_e3_t100_tot2500
  - /monty/motor_system_config: surface
  - /monty/learning_module: evidence_1lm_nn5
  - /monty/sensor_module: camera_surf_patch_only
  - /monty/connectivity: 1lm_patch_only
  - /environment: real_world_lite6_maixsense
  - /env_interface: real_world_manual_train_eval
  - /logging: basic_info_monty_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
  config:
    show_sensor_output: false
    max_train_steps: 200
    max_eval_steps: 200
    max_total_steps: 400
    n_train_epochs: 1
    n_eval_epochs: 1
    model_name_or_path: ""
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    environment:
      env_init_args:
        motion_debug_logging: true
        goal_adapter_config:
          debug_logging: true
    logging:
      run_name: real_world_lite6_maixsense_unsupervised
      python_log_level: DEBUG
    monty_config:
      monty_args:
        num_exploratory_steps: 10
        min_train_steps: 1
        min_eval_steps: 1
      motor_system_config:
        policy_selector:
          policy:
            # Use RealWorldSurfacePolicy so that _touch_object works without a
            # view-finder sensor
            _target_: multimodal_monty_meets_world.real_world_surface_policy.RealWorldSurfacePolicy
            # Maixsense A010 needs 10-20 cm working distance; 12 cm is a good target.
            desired_object_distance: 0.12
