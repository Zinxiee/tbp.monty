# @package _global_

defaults:
  - /monty: graph_exp1000_e3_t100_tot2500
  - /monty/motor_system_config: surface
  - /monty/learning_module: evidence_1lm_nn5
  - /monty/sensor_module: camera_surf_patch_only
  - /monty/connectivity: 1lm_patch_only
  - /environment: real_world_lite6_maixsense
  - /env_interface: real_world_manual_train_eval
  - /logging: basic_info_monty_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
  config:
    show_sensor_output: false
    max_train_steps: 200
    max_eval_steps: 200
    max_total_steps: 400
    n_train_epochs: 1
    n_eval_epochs: 1
    model_name_or_path: ""
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    environment:
      env_init_args:
        motion_debug_logging: true
        goal_adapter_config:
          debug_logging: true
    logging:
      run_name: real_world_lite6_maixsense_unsupervised
      python_log_level: DEBUG
    monty_config:
      monty_args:
        num_exploratory_steps: 35
        min_train_steps: 1
        min_eval_steps: 1
      learning_module_configs:
        learning_module_0:
          learning_module_args:
            # Thresholds re-tuned for Maixsense A010 noise floor (~1 mm depth
            # stddev; curvature estimate jitters several m^-1 on 20x20 patch;
            # intrinsics-driven lateral error ~5-6 mm at 120 mm standoff).
            tolerances:
              patch:
                hsv: ${np.array:[0.1, 0.2, 0.2]}
                principal_curvatures_log: ${np.array:[3.0, 3.0]}
            feature_weights:
              patch:
                hsv: ${np.array:[1, 0.5, 0.5]}
                pose_vectors: ${np.ones:3}
                principal_curvatures_log: ${np.array:[0.1, 0.1]}
            max_match_distance: 0.015
            graph_delta_thresholds:
              patch:
                distance: 0.008
                pose_vectors: ${np.list_eval:[np.pi / 6, np.pi * 2, np.pi * 2]}
                principal_curvatures_log:
                - 3.0
                - 3.0
                hsv:
                - 0.1
                - 1
                - 1
            hypotheses_updater_args:
              max_nneighbors: 10
      motor_system_config:
        policy_selector:
          policy:
            # Use RealWorldSurfacePolicy so that _touch_object works without a
            # view-finder sensor
            _target_: multimodal_monty_meets_world.real_world_surface_policy.RealWorldSurfacePolicy
            # Maixsense A010 needs 10-20 cm working distance; 12 cm is a good target.
            desired_object_distance: 0.12
