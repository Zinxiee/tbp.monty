# @package experiment.config.monty_config.learning_module_configs

# eval config for the distant (ZED) agent.
#
# pose_vectors: [0,0,0] — zeroed out because for the distant agent all surface
#   normals point toward the camera regardless of object identity, making this
#   feature non-discriminative and a driver of false matches.
#
# min_possible_match_evidence: 1 — the single-graph branch of
#   _threshold_possible_matches uses `ge >= min_possible_match_evidence` instead
#   of the default `>= 0`. Once a non-matching object's max evidence falls below
#   this value, no_match fires and a new graph is seeded. Without this, the
#   hypothesis space (max over many hypotheses) can hover at 0 indefinitely.
#
# object_evidence_threshold: 60 — requires strong accumulated evidence before
#   declaring a match; prevents premature commitment to the single stored graph.
#
# x_percent_threshold: 8 — tight: only hypotheses within 8% of max evidence
#   are considered possible.
#
# required_symmetry_evidence: 40 — avoids premature terminal state from symmetry.


defaults:
  - hypotheses_updater/burst_sampling_10nn@learning_module_0.learning_module_args

learning_module_0:
  learning_module_args:
    feature_weights:
      patch:
        hsv: ${np.array:[1.0, 0.5, 0.5]}
        pose_vectors: ${np.array:[0.0, 0.0, 0.0]}
        principal_curvatures_log: ${np.array:[2.0, 2.0]}
    tolerances:
      patch:
        hsv: ${np.array:[0.1, 0.2, 0.2]}
        principal_curvatures_log: ${np.array:[0.25, 0.25]}
    max_match_distance: 0.01
    x_percent_threshold: 8
    object_evidence_threshold: 60
    min_possible_match_evidence: 1
    required_symmetry_evidence: 40
    hypotheses_updater_args:
      max_nneighbors: 10
    evidence_threshold_config: all
    max_graph_size: 0.35
    num_model_voxels_per_dim: 100
    gsg:
      _target_: tbp.monty.frameworks.models.goal_generation.EvidenceGoalGenerator
      goal_tolerances:
        location: 0.015
      elapsed_steps_factor: 10
      min_post_goal_success_steps: 5
      x_percent_scale_factor: 0.75
      desired_object_distance: 0.32
  learning_module_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM}