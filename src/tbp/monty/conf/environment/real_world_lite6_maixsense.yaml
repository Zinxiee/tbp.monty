# @package experiment.config.environment

env_init_func: ${monty.class:tbp.monty.frameworks.environments.real_world_environment.RealWorldLite6A010Environment}
env_init_args:
  # Hardware object construction via Hydra instantiation.
  robot_interface:
    _target_: multimodal_monty_meets_world.factory.create_robot_interface
    ip_address: 192.168.1.159
    start_listener: true

  sensor_client:
    _target_: multimodal_monty_meets_world.factory.create_usb_frame_client
    port: /dev/sipeed
    baudrate: 921600
    timeout: 0.05
    validate_checksum: true
    checksum_policy: compatible
    auto_configure_stream: true
    stream_display_mode: 3
    stream_startup_delay_s: 0.15

  observation_adapter:
    _target_: multimodal_monty_meets_world.factory.create_observation_adapter
    # Intrinsics: estimated from FOV (70° H × 60° V) at the native 100×100 resolution
    fx: 71.41      # 50 / tan(35°)
    fy: 86.60      # 50 / tan(30°)
    cx: 50.0
    cy: 50.0
    # crop_center_to_square is a fallback guardrail for rectangular inputs.
    # When patch_* params are set, they take precedence and define the ROI.
    crop_center_to_square: true
    # ROI crop applied to the raw 100×100 sensor frame before unprojection.
    # 12×12 patch, horizontally centered (left=44, col-center=50) and
    # vertically centered at the same row as the prior 20×20 footprint
    # (bottom=19 → top=69 → row-center=75). Shrunk from 20×20 to reduce
    # OLS-plane-fit bias on curved objects (a 20×20 patch at 120 mm spans
    # ~28 mm, covering ~30° of arc on a 50 mm-radius bowl; a 12×12 patch
    # spans ~17 mm, ~20° of arc — significantly less plane-fit distortion).
    # Principal point (cx, cy) is shifted by (left, top) internally so
    # unprojection geometry stays correct.
    patch_height: 12
    patch_width: 12
    patch_offset_bottom_px: 19
    patch_offset_left_px: 44
    # 3×3 median filter on the raw depth image before unprojection. Reduces
    # per-pixel ToF noise (~4.5mm std at 116mm depth) while preserving edges,
    # so OLS surface-normal and curvature fits aren't dominated by noise.
    depth_median_filter_size: 3
    min_valid_depth_m: 0.05
    # Reject A010 specular/saturation returns at Stage C rather than letting them
    # leak into the world-bounds filter. A010 saturates at ~2.5 m; objects of
    # interest sit at 0.1–0.5 m, so 0.6 m gives headroom without clipping the scene.
    max_valid_depth_m: 0.6
    # Filter the table out of the semantic mask.
    # Robot is mounted on the table (table ≈ 0 mm in robot-base Z = Monty world Y).
    # A 10 mm margin excludes table pixels in all sensor orientations because the
    # filter operates in the fixed world frame.
    world_y_min_m: 0.01
    world_x_max_m: 0.3
    world_x_min_m: -0.3
    world_z_max_m: -0.1
    world_z_min_m: -0.5
    # Diagnostic toggle: log semantic counts before/after world-bounds filtering.
    semantic_debug_logging: false

  # goal_adapter will be instantiated in RealWorldLite6A010Environment.__init__
  # after robot_interface is available.
  goal_adapter: null
  
  # Goal adapter configuration (used during init if goal_adapter is null).
  goal_adapter_config:
    world_to_robot_translation_m: [0.0, 0.0, 0.0]  # Origin aligned; orientation mapping is configured below.
    world_to_robot_rotation_dict:
      # Map Monty right-up-backward world frame to Lite6 base frame:
      # Monty +x (right) -> Lite6 -y (right),
      # Monty +y (up) -> Lite6 +z (up),
      # Monty -z (forward) -> Lite6 +x (forward).
      w: 0.5
      x: 0.5
      y: -0.5
      z: -0.5
    link6_to_sensor_translation_m: [0.060, 0.0, 0.0135]
    link6_to_sensor_rotation_dict:
      # Sensor optical axis faces link6 +Z (downward at home pose, roll=180°).
      # In Monty right-up-backward convention sensor -Z = look direction, so
      # sensor -Z → link6 +Z.
      # Image right (sensor +X) points toward robot base (link6 -X at home).
      # Image top (sensor +Y) points robot-right (link6 +Y at home = world +X).
      # Derivation: Ry(180°) → quaternion [w=0, x=0, y=1, z=0].
      w: 0.0
      x: 0.0
      y: 1.0
      z: 0.0
    workspace_min_xyz_m: [0.135, -0.23, 0.075]
    workspace_max_xyz_m: [0.40, 0.23, 0.4]
    max_translation_step_m: 0.10
    max_rotation_step_deg: 35.0
    orientation_min_euler_deg: [-180.0, -170.0, -180.0]
    orientation_max_euler_deg: [180.0, 170.0, 180.0]
    convergence_timeout_s: 4.0
    convergence_position_tolerance_mm: 3.0
    min_command_interval_s: 0.0
    wait_for_min_command_interval: true
    wait_until_ready: true
    wait_until_ready_timeout_s: 2.0
    wait_until_ready_poll_s: 0.02
    safety_profile: very_relaxed
    payload_mass_kg: 0.056
    euler_sequence: xyz
    euler_degrees: true

  agent_id: agent_id_0
  sensor_id: patch
  # Home pose in robot-base frame: [x_mm, y_mm, z_mm, roll_deg, pitch_deg, yaw_deg]
  home_pose_mm_deg: [220, 9, 210, 180, 0.0, 0.0]
  # home_pose_mm_deg: [213.9, 7.8, 307.2, 179.6, 0.0, 1.6]
  # home_pose_mm_deg: [336.3, 10.7, 287.7, 180.0, 0.0, 0.0]
  settle_time_s: 0.25
  # Block each step until the robot reaches its commanded pose (or convergence_timeout_s
  # elapses). Without this, observations can be captured mid-motion and the xArm command
  # queue grows unboundedly because Python queues commands faster than the robot executes.
  settle_use_goal_convergence_gate: true
  settle_convergence_position_tolerance_mm: 3.0
  settle_convergence_required_consecutive_samples: 2
  home_reset_timeout_s: 8.0
  home_reset_poll_s: 0.02
  home_reset_position_tolerance_mm: 20.0
  home_reset_orientation_tolerance_deg: 10.0
  require_object_swap_confirmation: true
  object_swap_prompt: "Swap/position the object, then press Enter to continue: "
  # World frame is assumed to match robot base frame for v1.
  sensor_translation_m: [0.0, 0.0, 0.0]
  sensor_rotation_wxyz: [1.0, 0.0, 0.0, 0.0]
  depth_unit: 0
  sensor_frame_timeout_s: 1.5
  sensor_frame_max_retries: 3
  sensor_frame_retry_delay_s: 0.05
  # Burst N consecutive depth captures per step and average per-pixel to
  # suppress temporally-independent ToF noise (~70% of per-pixel jitter in
  # offline analysis). 5 frames → √5 ≈ 2.24× noise reduction on that
  # component. Adds ~5 × sensor_period latency per step (~200ms at ~25Hz).
  depth_burst_n: 5
  sensed_orientation_sequence: xyz
  sensed_orientation_degrees: false
  sensed_orientation_intrinsic: false
  sensed_orientation_index_order: [0, 1, 2]
  sensed_orientation_signs: [1.0, 1.0, 1.0]
  sensed_orientation_offset_wxyz: [1.0, 0.0, 0.0, 0.0]
  sensed_motion_offset_wxyz: [1.0, 0.0, 0.0, 0.0]
  # sensed_motion_offset_wxyz: [0.70710678, -0.70710678, 0.0, 0.0]
  # Minimum world-Y for the sensor position.  Prevents the surface agent
  # from drifting into the table rejection zone during vertical orient
  # corrections on curved objects.  Should be above world_y_min_m (0.01)
  # with enough margin for the sensor FOV footprint.
  min_sensor_height_m: 0.05
transform: null
